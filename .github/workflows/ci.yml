name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  format:
    name: Format
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Format (check)
        shell: pwsh
        run: ./devscripts/format.ps1 -Check

  lint:
    name: Lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Lint
        shell: pwsh
        run: ./devscripts/lint.ps1

  typecheck:
    name: Typecheck
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Typecheck
        shell: pwsh
        run: ./devscripts/typecheck.ps1

  test:
    name: Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Tests (dry-run)
        shell: pwsh
        run: ./devscripts/test.ps1 -DryRun

  build:
    name: Build
    needs: [format, lint, typecheck, test]
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_release: ${{ steps.version.outputs.is_release }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute next version (YY.N)
        id: version
        shell: pwsh
        run: |
          $next = ./devscripts/bump-version.ps1 -Next -EnsureUniqueTag
          $isRelease = "${{ github.event_name }}" -eq "push" -and "${{ github.ref }}" -eq "refs/heads/main"
          "version=$next"            | Out-File -Append $env:GITHUB_OUTPUT
          "is_release=$isRelease"    | Out-File -Append $env:GITHUB_OUTPUT
          Write-Host "Next version: $next (release=$isRelease)"

      - name: Stamp version metadata for build
        shell: pwsh
        run: ./devscripts/bump-version.ps1 -Version "${{ steps.version.outputs.version }}"

      - uses: actions/upload-artifact@v4
        with:
          name: source-stamped
          path: |
            .
            !dist
            !.git

  package:
    name: Package
    needs: build
    runs-on: windows-latest
    outputs:
      version: ${{ needs.build.outputs.version }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: source-stamped
          path: .

      - name: Package
        shell: pwsh
        run: ./devscripts/package.ps1 -Version "${{ needs.build.outputs.version }}" -OutputDir dist

      - uses: actions/upload-artifact@v4
        with:
          name: wininit-${{ needs.build.outputs.version }}
          path: dist/*.zip
          if-no-files-found: error

  release:
    name: Release
    needs: [build, package]
    if: needs.build.outputs.is_release == 'True'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          name: wininit-${{ needs.build.outputs.version }}
          path: dist

      - name: Commit VERSION bump
        shell: pwsh
        run: |
          $v = "${{ needs.build.outputs.version }}"
          ./devscripts/bump-version.ps1 -Version $v
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION .github/badges/version.json readme.md
          git diff --cached --quiet
          $diffExit = $LASTEXITCODE
          if ($diffExit -eq 1) {
            git commit -m "release: $v [skip ci]"
            git push origin HEAD:main
          } elseif ($diffExit -ne 0) {
            exit $diffExit
          }

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $v = "${{ needs.build.outputs.version }}"
          gh release create "$v" dist/*.zip `
            --title "$v" `
            --generate-notes `
            --target main
